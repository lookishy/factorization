    <script>
        // --- 纯前端音频引擎调音 ---
        class SoundEngine {
            constructor() { this.ctx = null; this.isMuted = false; }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            playTick(isUrgent) {
                if (!this.ctx || this.isMuted) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(isUrgent ? 800 : 600, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            }
            playWireCut() {
                if (!this.ctx || this.isMuted) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            }
            playExplosion() {
                if (!this.ctx || this.isMuted) return;
                const bufferSize = this.ctx.sampleRate * 1.5;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (this.ctx.sampleRate * 0.3));
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(1, this.ctx.currentTime);
                noise.connect(gain); gain.connect(this.ctx.destination);
                noise.start();
            }
            playWin() {
                if (!this.ctx || this.isMuted) return;
                const now = this.ctx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + i * 0.15);
                    gain.gain.setValueAtTime(0.3, now + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 1);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 1);
                });
            }
        }

        const soundEngine = new SoundEngine();

        // --- Firebase Configuration ---
        const firebaseConfig = {
            // 请在此填入 Firebase 配置信息
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- 核心全局状态 ---
        let score = 0;
        let timeLeft = 90;
        let gameState = 'menu'; 
        let difficulty = 'easy';
        let currentProblem = null;
        let timerInterval = null;
        let wiresCut = { left: false, right: false };

        // --- 数学计算核心辅助 ---
        const gcd = (a, b) => { a = Math.abs(a); b = Math.abs(b); while (b) { const t = b; b = a % b; a = t; } return a; };
        const gcd3 = (a, b, c) => gcd(a, gcd(b, c));
        const randNonZero = (min, max) => { let val = 0; while (val === 0) val = Math.floor(Math.random() * (max - min + 1)) + min; return val; };
        const getFactorPairs = (n) => {
            const pairs = [];
            for (let i = 1; i * i <= n; i++) { if (n % i === 0) pairs.push([i, n / i]); }
            return pairs;
        };

        // --- 随机自动化题目生成器 ---
        function generateQuadratic(diff) {
            let p = 1, q = 1, r = 1, s = 1;
            let a = 1, b = 1, c = 1;
            let isValid = false;
            while (!isValid) {
                if (diff === 'easy') {
                    p = 1; r = 1; q = randNonZero(1, 9); s = randNonZero(1, 9);
                } else if (diff === 'medium') {
                    const primes = [2, 3, 5, 7];
                    const chosenA = primes[Math.floor(Math.random() * primes.length)];
                    if (Math.random() > 0.5) { p = chosenA; r = 1; } else { p = 1; r = chosenA; }
                    q = randNonZero(-9, 9); s = randNonZero(-9, 9);
                } else if (diff === 'hard') {
                    const composites = [4, 6, 8, 9, 10, 12];
                    const chosenA = composites[Math.floor(Math.random() * composites.length)];
                    const pairs = getFactorPairs(chosenA);
                    const pair = pairs[Math.floor(Math.random() * pairs.length)];
                    if (Math.random() > 0.5) { p = pair[0]; r = pair[1]; } else { p = pair[1]; r = pair[0]; }
                    if (Math.random() > 0.5) { const temp = p; p = r; r = temp; }
                    q = randNonZero(-12, 12); s = randNonZero(-12, 12);
                } else if (diff === 'hell') {
                    const composites = [4, 6, 8, 9, 10, 12];
                    const chosenA = composites[Math.floor(Math.random() * composites.length)];
                    const pairs = getFactorPairs(chosenA);
                    const pair = pairs[Math.floor(Math.random() * pairs.length)];
                    if (Math.random() > 0.5) { p = -pair[0]; r = pair[1]; } else { p = pair[1]; r = -pair[0]; }
                    if (Math.random() > 0.5) { const temp = p; p = r; r = temp; }
                    q = randNonZero(-15, 15); s = randNonZero(-15, 15);
                }
                a = p * r; b = (p * s) + (q * r); c = q * s;
                if (b !== 0 && c !== 0 && gcd3(a, b, c) === 1) isValid = true;
            }

            const formatTerm = (coeff, power, isFirst) => {
                if (coeff === 0) return '';
                const absCoeff = Math.abs(coeff);
                const sign = coeff < 0 ? '-' : (isFirst ? '' : '+');
                const strCoeff = (absCoeff === 1 && power > 0) ? '' : absCoeff;
                const variable = power === 2 ? 'x²' : (power === 1 ? 'x' : '');
                return `${sign}${strCoeff}${variable}`;
            };

            let expression = "";
            if (diff === 'hell') {
                const termA = { coeff: a, power: 2 };
                const termB = { coeff: b, power: 1 };
                const termC = { coeff: c, power: 0 };
                let terms = [termA, termB, termC];
                // Shuffle terms array
                for (let i = terms.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [terms[i], terms[j]] = [terms[j], terms[i]];
                }

                expression = terms.map((t, index) => {
                    const isFirst = index === 0;
                    let formatted = formatTerm(t.coeff, t.power, isFirst);
                    if (!isFirst && t.coeff > 0) {
                        // formatTerm returns e.g. "+3x", "+5" or "3x" if isFirst
                        // since formatTerm doesn't add space, we manually add it around signs
                        formatted = formatted.replace('+', ' + ');
                    } else if (!isFirst && t.coeff < 0) {
                        formatted = formatted.replace('-', ' - ');
                    } else if (isFirst && t.coeff < 0) {
                        // "-3x²" -> "-3x²"
                    }
                    return formatted;
                }).join('');
                // If it starts with + from any weird logic, remove it
                if (expression.startsWith(' + ')) expression = expression.substring(3);

                // Cleanup multiple spaces
                expression = expression.replace(/\s+/g, ' ').trim();
            } else {
                expression = `${formatTerm(a, 2, true).replace('-', '- ')} ${formatTerm(b, 1, false).replace('+', '+ ').replace('-', '- ')} ${formatTerm(c, 0, false).replace('+', '+ ').replace('-', '- ')}`;
                expression = expression.replace(/\s+/g, ' ').trim();
                // Fix leading minus sign space
                if (expression.startsWith('- ')) {
                    expression = '-' + expression.substring(2);
                }
            }

            return { a, b, c, expression, correctFactors: { p, q, r, s } };
        }

        // --- 排行榜实时监听 ---
        let leaderboardUnsubscribe = null;

        function openLeaderboard() {
            document.getElementById('leaderboard-modal').classList.remove('hidden');
            if (!leaderboardUnsubscribe) {
                // 监听 Firestore 中 averageScore 前 10 名
                leaderboardUnsubscribe = db.collection('users')
                    .orderBy('averageScore', 'desc')
                    .limit(10)
                    .onSnapshot((snapshot) => {
                        const listDiv = document.getElementById('leaderboard-list');
                        listDiv.innerHTML = '';

                        if (snapshot.empty) {
                            listDiv.innerHTML = '<div class="text-center text-slate-400 py-8">暂无数据</div>';
                            return;
                        }

                        let html = '<table class="w-full text-left text-sm">';
                        html += '<thead class="text-slate-400 border-b border-slate-600"><tr><th class="pb-2 w-12 text-center">名次</th><th class="pb-2">特工代号</th><th class="pb-2 text-right">平均分</th><th class="pb-2 text-right">存活率</th></tr></thead><tbody>';

                        let rank = 1;
                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            const isMe = currentUser && currentUser.uid === doc.id;
                            const rowClass = isMe ? "bg-slate-700 font-bold text-yellow-400" : "border-b border-slate-700 hover:bg-slate-700/50";

                            let rankDisplay = `<span class="text-slate-400">${rank}</span>`;
                            if (rank === 1) rankDisplay = '🥇';
                            else if (rank === 2) rankDisplay = '🥈';
                            else if (rank === 3) rankDisplay = '🥉';

                            html += `<tr class="${rowClass} transition-colors">
                                <td class="py-3 text-center text-lg">${rankDisplay}</td>
                                <td class="py-3 truncate max-w-[120px]">${data.displayName || 'Unknown'}</td>
                                <td class="py-3 text-right text-yellow-500 font-mono">${Math.round(data.averageScore || 0)}</td>
                                <td class="py-3 text-right text-emerald-400 font-mono">${Math.round(data.survivalRate || 0)}%</td>
                            </tr>`;
                            rank++;
                        });
                        html += '</tbody></table>';
                        listDiv.innerHTML = html;
                    }, (err) => {
                        console.error("Leaderboard fetch error:", err);
                        document.getElementById('leaderboard-list').innerHTML = '<div class="text-center text-red-400 py-8">加载排行榜失败</div>';
                    });
            }
        }

        function closeLeaderboard() {
            document.getElementById('leaderboard-modal').classList.add('hidden');
        }

        // --- 用户状态与登录逻辑 ---
        let currentUser = null;
        let userData = {
            totalPlays: 0,
            totalScore: 0,
            deaths: 0,
            averageScore: 0,
            survivalRate: 0,
            displayName: ""
        };

        function showLogin() {
            gameState = 'login';
            document.getElementById('app').className = "min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 select-none overflow-hidden";
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('explosion-effect').classList.add('hidden');
        }

        async function loginWithGoogle() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                if (!user.email || !user.email.endsWith('@tsunjin.edu.my')) {
                    document.getElementById('login-error').innerText = "请使用学校官方电邮登录！";
                    document.getElementById('login-error').classList.remove('hidden');
                    await firebase.auth().signOut();
                    return;
                }
                document.getElementById('login-error').classList.add('hidden');
                // 登录成功后 onAuthStateChanged 会处理后续
            } catch (error) {
                console.error("Login error:", error);
                document.getElementById('login-error').innerText = "登录失败：" + error.message;
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function loadUserData(user) {
            try {
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();

                let defaultName = user.displayName;
                if (!defaultName) {
                    defaultName = user.email.split('@')[0];
                }

                if (doc.exists) {
                    userData = doc.data();
                    // 确保旧数据里有 displayName
                    if (!userData.displayName) {
                        userData.displayName = defaultName;
                    }
                } else {
                    userData = {
                        totalPlays: 0,
                        totalScore: 0,
                        deaths: 0,
                        averageScore: 0,
                        survivalRate: 0,
                        displayName: defaultName
                    };
                    await userRef.set(userData);
                }
            } catch (err) {
                console.error("Error loading user data:", err);
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user && user.email && user.email.endsWith('@tsunjin.edu.my')) {
                currentUser = user;
                await loadUserData(user);
                showMenu();
            } else {
                currentUser = null;
                showLogin();
            }
        });

        // --- 状态场景切换渲染 ---
        function showMenu() {
            gameState = 'menu';
            document.getElementById('app').className = "min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 select-none overflow-hidden";
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('explosion-effect').classList.add('hidden');
            document.getElementById('menu-score').innerText = `平均 ${Math.round(userData.averageScore)} 分 | 存活率 ${Math.round(userData.survivalRate)}%`;
            if (timerInterval) clearInterval(timerInterval);
        }

        function startGame(diff) {
            soundEngine.init();
            difficulty = diff;
            gameState = 'playing';
            timeLeft = 90;
            wiresCut = { left: false, right: false };
            currentProblem = generateQuadratic(difficulty);

            // 清空、启用所有插槽
            ['tl', 'tr', 'bl', 'br'].forEach(id => {
                const el = document.getElementById(`input-${id}`);
                el.value = '';
                el.disabled = false;
            });

            // 完美复位物理导线图形与电火花
            document.getElementById('wire-left-top').setAttribute('d', "M 60,30 C 60,100 20,150 60,220");
            document.getElementById('wire-left-bottom').setAttribute('d', "");
            document.getElementById('wire-right-top').setAttribute('d', "M 320,30 C 320,100 360,150 320,220");
            document.getElementById('wire-right-bottom').setAttribute('d', "");
            document.getElementById('spark-left').classList.add('hidden');
            document.getElementById('spark-right').classList.add('hidden');

            // 屏幕看板数据注入
            document.getElementById('expression-text').innerText = currentProblem.expression;
            document.getElementById('expression-text').className = "font-mono text-3xl md:text-4xl tracking-widest font-bold text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('points-earned').classList.add('hidden');
            document.getElementById('game-score').innerText = score;
            document.getElementById('btn-defuse').classList.remove('hidden');
            document.getElementById('btn-retry').classList.add('hidden');
            updateDefuseButton();

            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');

            // 启动定时线程
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    handleExplosion();
                } else if (timeLeft <= 10) {
                    soundEngine.playTick(true);
                } else if (timeLeft <= 30) {
                    soundEngine.playTick(false);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const el = document.getElementById('timer-text');
            el.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft < 10) {
                el.className = "font-mono font-bold text-xl text-red-500 animate-pulse";
            } else {
                el.className = "font-mono font-bold text-xl text-red-600";
            }
        }

        // --- 实时交叉相乘法动态判定引擎 ---
        function onInputChange() {
            if (gameState !== 'playing') return;
            
            // 严审输入：只允许数字及负号
            ['tl', 'tr', 'bl', 'br'].forEach(id => {
                const el = document.getElementById(`input-${id}`);
                el.value = el.value.replace(/[^0-9-]/g, '');
            });

            const tl = parseInt(document.getElementById('input-tl').value);
            const bl = parseInt(document.getElementById('input-bl').value);
            const tr = parseInt(document.getElementById('input-tr').value);
            const br = parseInt(document.getElementById('input-br').value);

            // 物理剪线路判定1：首项乘积匹配
            if (!isNaN(tl) && !isNaN(bl) && tl * bl === currentProblem.a) {
                if (!wiresCut.left) {
                    soundEngine.playWireCut();
                    document.getElementById('wire-left-top').setAttribute('d', "M 60,30 C 60,80 20,80 30,120");
                    document.getElementById('wire-left-bottom').setAttribute('d', "M 60,220 C 60,180 80,180 70,160");
                    document.getElementById('spark-left').classList.remove('hidden');
                    wiresCut.left = true;
                }
            } else {
                if (wiresCut.left) {
                    document.getElementById('wire-left-top').setAttribute('d', "M 60,30 C 60,100 20,150 60,220");
                    document.getElementById('wire-left-bottom').setAttribute('d', "");
                    document.getElementById('spark-left').classList.add('hidden');
                    wiresCut.left = false;
                }
            }

            // 物理剪线路判定2：常数项乘积匹配
            if (!isNaN(tr) && !isNaN(br) && tr * br === currentProblem.c) {
                if (!wiresCut.right) {
                    soundEngine.playWireCut();
                    document.getElementById('wire-right-top').setAttribute('d', "M 320,30 C 320,80 360,80 350,120");
                    document.getElementById('wire-right-bottom').setAttribute('d', "M 320,220 C 320,180 300,180 310,160");
                    document.getElementById('spark-right').classList.remove('hidden');
                    wiresCut.right = true;
                }
            } else {
                if (wiresCut.right) {
                    document.getElementById('wire-right-top').setAttribute('d', "M 320,30 C 320,100 360,150 320,220");
                    document.getElementById('wire-right-bottom').setAttribute('d', "");
                    document.getElementById('spark-right').classList.add('hidden');
                    wiresCut.right = false;
                }
            }

            updateDefuseButton();
        }

        function updateDefuseButton() {
            const btn = document.getElementById('btn-defuse');
            if (wiresCut.left && wiresCut.right) {
                btn.disabled = false;
                btn.className = "px-8 py-3 rounded shadow-xl font-black text-lg uppercase tracking-widest transition-all flex items-center gap-2 border-b-4 bg-red-600 border-red-800 text-white hover:bg-red-500 cursor-pointer animate-pulse";
            } else {
                btn.disabled = true;
                btn.className = "px-8 py-3 rounded shadow-xl font-black text-lg uppercase tracking-widest transition-all flex items-center gap-2 border-b-4 bg-gray-700 border-gray-800 text-gray-500 cursor-not-allowed";
            }
        }

        // --- 点击拆弹（验证一次项中间项） ---
        function attemptDefuse() {
            if (gameState !== 'playing') return;
            clearInterval(timerInterval);

            const tl = parseInt(document.getElementById('input-tl').value);
            const bl = parseInt(document.getElementById('input-bl').value);
            const tr = parseInt(document.getElementById('input-tr').value);
            const br = parseInt(document.getElementById('input-br').value);

            // 核心公式：交叉相乘再相加
            const middleTerm = (tl * br) + (tr * bl);

            if (middleTerm === currentProblem.b) {
                handleWin(tl, tr, bl, br);
            } else {
                handleExplosion();
            }
        }

        function formatBinomial(a, b) {
            const aStr = a === 1 ? '' : (a === -1 ? '-' : a);
            const bStr = b > 0 ? `+${b}` : `${b}`;
            return `(${aStr}x${bStr})`;
        }

        async function updateUserStats(earnedScore, isDeath) {
            if (!currentUser) return;
            try {
                userData.totalPlays += 1;
                if (isDeath) userData.deaths += 1;
                userData.totalScore += earnedScore;

                userData.averageScore = userData.totalPlays > 0 ? userData.totalScore / userData.totalPlays : 0;
                userData.survivalRate = userData.totalPlays > 0 ? ((userData.totalPlays - userData.deaths) / userData.totalPlays) * 100 : 0;

                const userRef = db.collection('users').doc(currentUser.uid);
                await userRef.update({
                    totalPlays: userData.totalPlays,
                    deaths: userData.deaths,
                    totalScore: userData.totalScore,
                    averageScore: userData.averageScore,
                    survivalRate: userData.survivalRate
                });
            } catch (err) {
                console.error("Error updating stats:", err);
            }
        }

        function handleWin(tl, tr, bl, br) {
            gameState = 'defused';
            soundEngine.playWin();
            disableInputs();

            let basePoints = difficulty === 'easy' ? 100 : (difficulty === 'medium' ? 150 : (difficulty === 'hard' ? 200 : 300));
            const earned = basePoints + timeLeft;
            score += earned;

            updateUserStats(earned, false);

            document.getElementById('expression-text').className = "font-mono text-3xl md:text-4xl tracking-widest font-bold text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]";
            document.getElementById('feedback-box').classList.remove('hidden');
            
            document.getElementById('feedback-text').innerText = "=" + formatBinomial(tl, tr) + formatBinomial(bl, br);
            document.getElementById('feedback-text').className = "font-bold text-xl text-green-400";

            document.getElementById('points-text').innerText = `+ ${earned} 分!`;
            document.getElementById('points-earned').classList.remove('hidden');
            document.getElementById('game-score').innerText = score;

            document.getElementById('btn-defuse').classList.add('hidden');
            document.getElementById('btn-retry').classList.remove('hidden');
        }

        function handleExplosion() {
            gameState = 'exploded';
            soundEngine.playExplosion();
            clearInterval(timerInterval);
            disableInputs();

            updateUserStats(0, true);

            document.getElementById('app').className = "min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 select-none overflow-hidden animate-shake";
            document.getElementById('explosion-effect').classList.remove('hidden');

            document.getElementById('expression-text').className = "font-mono text-3xl md:text-4xl tracking-widest font-bold text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            document.getElementById('feedback-box').classList.remove('hidden');

            const f = currentProblem.correctFactors;
            document.getElementById('feedback-text').innerText = "=" + formatBinomial(f.p, f.q) + formatBinomial(f.r, f.s);
            document.getElementById('feedback-text').className = "font-bold text-xl text-yellow-500";

            document.getElementById('btn-defuse').classList.add('hidden');
            document.getElementById('btn-retry').classList.remove('hidden');
        }

        function disableInputs() {
            ['tl', 'tr', 'bl', 'br'].forEach(id => {
                document.getElementById(`input-${id}`).disabled = true;
            });
        }

        function toggleMute() {
            soundEngine.isMuted = !soundEngine.isMuted;
            const icon = document.getElementById('mute-icon');
            if (soundEngine.isMuted) {
                icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
            } else {
                icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
            }
        }

        // 初始化载入登录页 (onAuthStateChanged 会接管)
        showLogin();
    </script>
</body>
</html>
